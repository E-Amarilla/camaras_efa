# Configuración minimal para MediaMTX v1.14.0

# Logging
logLevel: info
logDestinations: [stdout]

# RTSP Server (nueva sintaxis)
rtsp: true
rtspAddress: :8554
rtspTransports: [udp, multicast, tcp]

# HLS Server (nueva sintaxis)
hls: true
hlsAddress: :8888
hlsAllowOrigin: "*"
# fmp4: mejor soporte de Chrome MSE, manejo limpio de discontinuidades del DVR
# 2s + 10 segmentos = ventana de 20s (resiste throttling de Chrome en background)
hlsVariant: fmp4
hlsSegmentCount: 10
hlsSegmentDuration: 2s

# WebRTC Server (nueva sintaxis)
webrtc: true
webrtcAddress: :8889
webrtcAllowOrigin: "*"

# Paths
paths:
  cam1:
    source: rtsp://admin:Beron2745@{{CAMERA_IP}}:554/Streaming/Channels/101
  cam2:
    source: rtsp://admin:Beron2745@{{CAMERA_IP}}:554/Streaming/Channels/201
  cam3:
    source: rtsp://admin:Beron2745@{{CAMERA_IP}}:554/Streaming/Channels/301
  cam4:
    source: rtsp://admin:Beron2745@{{CAMERA_IP}}:554/Streaming/Channels/501