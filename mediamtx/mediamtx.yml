# Configuración minimal para MediaMTX v1.14.0

# Logging
logLevel: info
logDestinations: [stdout]

# RTSP Server (nueva sintaxis)
rtsp: true
rtspAddress: :8554
rtspTransports: [udp, multicast, tcp]

# HLS Server (nueva sintaxis)
hls: true
hlsAddress: :8888
hlsAllowOrigin: "*"
# fmp4: mejor soporte de Chrome MSE, manejo limpio de discontinuidades del DVR
# 1s + 6 segmentos = ventana de 6s; segmentos cortos → granularidad de deriva ~1s
hlsVariant: fmp4
hlsSegmentCount: 6
hlsSegmentDuration: 1s
# Mantener el muxer HLS siempre activo aunque no haya clientes conectados
# Evita el "destroyed: not used anymore" y elimina el delay de reconexión
hlsAlwaysRemux: true
# Tiempo máximo sin lectores antes de destruir el muxer (24h = prácticamente nunca)
hlsMuxerCloseAfter: 24h

# WebRTC Server (nueva sintaxis)
webrtc: true
webrtcAddress: :8889
webrtcAllowOrigin: "*"

# Paths
paths:
  cam1:
    source: rtsp://admin:Beron2745@192.168.10.160:554/Streaming/Channels/101
  cam2:
    source: rtsp://admin:Beron2745@192.168.10.160:554/Streaming/Channels/201
  cam3:
    source: rtsp://admin:Beron2745@192.168.10.160:554/Streaming/Channels/301
  cam4:
    source: rtsp://admin:Beron2745@192.168.10.160:554/Streaming/Channels/501